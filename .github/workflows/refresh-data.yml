name: Refresh plant data

# Re-pull Permapeople and re-transform on a schedule. Commits the refreshed
# dataset only when it actually changed; the push then triggers the Pages
# deploy. This is the "stay current" half of static-snapshot + scheduled-rebuild.
on:
  schedule:
    - cron: "0 6 * * 1" # Mondays 06:00 UTC
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: refresh-data

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Pull and transform
        env:
          PERMAPEOPLE_KEY_ID: ${{ secrets.PERMAPEOPLE_KEY_ID }}
          PERMAPEOPLE_KEY_SECRET: ${{ secrets.PERMAPEOPLE_KEY_SECRET }}
        run: |
          if [ -z "$PERMAPEOPLE_KEY_ID" ] || [ -z "$PERMAPEOPLE_KEY_SECRET" ]; then
            echo "Permapeople secrets not set — skipping. Add PERMAPEOPLE_KEY_ID and"
            echo "PERMAPEOPLE_KEY_SECRET as repo Actions secrets to enable auto-refresh."
            exit 0
          fi
          npm run data:pull
          npm run data:transform
      - name: Commit if the data changed
        run: |
          if [ -n "$(git status --porcelain public/data)" ]; then
            git config user.name "ampactor-bot"
            git config user.email "ampactorlabs@gmail.com"
            git add public/data
            git commit -m "data: scheduled Permapeople refresh"
            git push
            echo "Refreshed dataset committed."
          else
            echo "No changes since last refresh."
          fi
